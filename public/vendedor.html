<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foto na Cerâmica — Vendas</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/vendedor.css" />
    <script src="/auth.js"></script>
  </head>
  <body>
    <div id="app-vendedor">
      <div class="topo">
        <div class="logo-wrap">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
              <rect x="3" y="8" width="22" height="16" rx="3" fill="#1C1C1C" />
              <circle cx="14" cy="16" r="5" fill="#E8C547" />
              <circle cx="14" cy="16" r="3" fill="#1C1C1C" opacity="0.5" />
              <rect x="10" y="5" width="8" height="4" rx="1.5" fill="#1C1C1C" />
            </svg>
          </div>
          <div>
            <div class="logo-nome">Foto na Cerâmica</div>
            <div class="logo-sub" id="info-vendedor"></div>
          </div>
        </div>
        <div class="topo-direita">
          <button class="btn-ghost" onclick="voltarMenu()">Menu</button>
          <button class="btn-ghost" onclick="sair()">Sair</button>
        </div>
      </div>

      <div class="vendedor-conteudo">
        <!-- TELA DO PEDIDO -->
        <div id="tela-pedido">
          <div class="card">
            <h2>Foto do cliente</h2>
            <div class="foto-area">
              <div class="foto-placeholder" id="foto-placeholder">
                <svg
                  width="40"
                  height="40"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
                  />
                  <circle cx="12" cy="13" r="4" />
                </svg>
                <div class="foto-acoes">
                  <button class="btn btn-primary" onclick="abrirCamera()">
                    Câmera
                  </button>
                  <button class="btn btn-dark" onclick="abrirGaleria()">
                    Galeria
                  </button>
                </div>
              </div>
              <img id="preview-foto" src="" alt="" style="display:none" />
            </div>
            <input
              type="file"
              id="input-camera"
              accept="image/*"
              capture="environment"
              onchange="mostrarPreview(this)"
              style="display:none"
            />
            <input
              type="file"
              id="input-galeria"
              accept="image/*"
              onchange="mostrarPreview(this)"
              style="display:none"
            />
          </div>

          <div class="card">
            <h2>Ponto de venda</h2>
            <div class="ponto-selector">
              <div
                class="ponto-btn selecionado"
                id="ponto-cima"
                onclick="selecionarPonto('cima')"
              >
                Cima da escada
              </div>
              <div
                class="ponto-btn"
                id="ponto-baixo"
                onclick="selecionarPonto('baixo')"
              >
                Baixo da escada
              </div>
            </div>
          </div>

          <div class="card">
            <h2>Produtos</h2>
            <div id="lista-produtos">
              <div class="vazio-produtos">Carregando produtos...</div>
            </div>
            <div
              id="carrinho-resumo"
              class="carrinho-resumo"
              style="display:none"
            >
              <div id="carrinho-linhas"></div>
            </div>
          </div>

          <div class="card">
            <label class="input-label">Nome do cliente (opcional)</label>
            <input
              class="input"
              type="text"
              id="nome-cliente"
              placeholder="Ex: Maria, turista alemã..."
            />
          </div>

          <button
            class="btn btn-primary btn-full"
            id="btn-enviar"
            onclick="enviarPedido()"
            style="margin-bottom:16px; padding:16px;"
          >
            Enviar pedido para produção
          </button>
        </div>
        <!-- FIM TELA DO PEDIDO -->

        <!-- TELA DE SUCESSO -->
        <div id="tela-sucesso" class="card tela-sucesso" style="display:none">
          <h2>Pedidos enviados!</h2>
          <div id="lista-pedidos-criados"></div>
          <button
            class="btn btn-dark btn-full"
            onclick="novoPedido()"
            style="margin-top:16px;"
          >
            Nova venda
          </button>
        </div>
        <!-- FIM TELA DE SUCESSO -->
      </div>
    </div>

    <script src="/js/vendedor.js"></script>
  </body>
</html>
