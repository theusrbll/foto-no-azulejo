<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foto na Cerâmica — Produção</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/producao.css" />
    <script src="/auth.js"></script>
  </head>
  <body>
    <div id="app-producao">
      <div class="topo">
        <div class="logo-wrap">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
              <rect x="3" y="8" width="22" height="16" rx="3" fill="#1C1C1C" />
              <circle cx="14" cy="16" r="5" fill="#E8C547" />
              <circle cx="14" cy="16" r="3" fill="#1C1C1C" opacity="0.5" />
              <rect x="10" y="5" width="8" height="4" rx="1.5" fill="#1C1C1C" />
            </svg>
          </div>
          <div>
            <div class="logo-nome">Foto na Cerâmica</div>
            <div class="logo-sub">Produção</div>
          </div>
        </div>
        <div class="topo-direita">
          <button class="btn-ghost" id="btn-som" onclick="toggleSom()">
            Som: OFF
          </button>
          <button class="btn-ghost" onclick="voltarMenu()">Menu</button>
          <button class="btn-ghost" onclick="sair()">Sair</button>
        </div>
      </div>

      <div class="kanban">
        <div class="coluna">
          <div class="coluna-titulo">
            <h2>Novo pedido</h2>
            <span class="coluna-badge badge-novo" id="badge-novo">0</span>
          </div>
          <div id="col-novo"></div>
        </div>

        <div class="coluna">
          <div class="coluna-titulo">
            <h2>Em produção</h2>
            <span class="coluna-badge badge-producao" id="badge-producao"
              >0</span
            >
          </div>
          <div id="col-producao"></div>
        </div>

        <div class="coluna">
          <div class="coluna-titulo">
            <h2>Pronto hoje</h2>
            <span class="coluna-badge badge-pronto" id="badge-pronto">0</span>
          </div>
          <div id="col-pronto"></div>
        </div>
      </div>
    </div>

    <script src="/js/producao.js"></script>
  </body>
</html>
