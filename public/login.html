<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foto na Cerâmica — Entrar</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body>
    <div class="login-wrap">
      <!-- LOGO -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
            <rect x="3" y="8" width="22" height="16" rx="3" fill="#1C1C1C" />
            <circle cx="14" cy="16" r="5" fill="#1C1C1C" opacity="0.6" />
            <circle cx="14" cy="16" r="3" fill="#E8C547" />
            <rect x="10" y="5" width="8" height="4" rx="1.5" fill="#1C1C1C" />
            <circle cx="21" cy="11" r="1.5" fill="#1C1C1C" opacity="0.4" />
          </svg>
        </div>
        <div class="login-logo-nome">Foto na Cerâmica</div>
        <div class="login-logo-sub">Escadaria Selarón · Sistema interno</div>
      </div>

      <!-- TELA DE LOGIN -->
      <div id="tela-login">
        <div class="login-card">
          <div class="login-campo">
            <label class="input-label">Nome</label>
            <input
              class="input"
              type="text"
              id="nome"
              placeholder="Seu nome"
              autocomplete="off"
            />
          </div>
          <div class="login-campo">
            <label class="input-label">Senha</label>
            <input
              class="input"
              type="password"
              id="senha"
              placeholder="Sua senha"
            />
          </div>
          <button
            class="btn btn-primary btn-full"
            id="btn-entrar"
            onclick="fazerLogin()"
          >
            Entrar
          </button>
          <div class="erro-msg" id="erro"></div>
        </div>
        <div class="login-rodape">Foto na Cerâmica · Escadaria Selarón</div>
      </div>

      <!-- MENU DE MÓDULOS -->
      <div id="tela-menu" style="display:none">
        <div class="login-card">
          <p class="menu-saudacao" id="menu-saudacao"></p>

          <a class="opcao" id="opcao-vendas" href="/vendedor.html">
            <div class="opcao-icone vendas">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#1A5276"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
                />
                <circle cx="12" cy="13" r="4" />
              </svg>
            </div>
            <div>
              <div class="opcao-titulo">Vendas</div>
              <div class="opcao-desc">Tirar foto e enviar pedido</div>
            </div>
          </a>

          <a class="opcao" id="opcao-producao" href="/producao.html">
            <div class="opcao-icone producao">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#BF360C"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="7" width="20" height="14" rx="2" />
                <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                <line x1="12" y1="12" x2="12" y2="16" />
                <line x1="10" y1="14" x2="14" y2="14" />
              </svg>
            </div>
            <div>
              <div class="opcao-titulo">Produção</div>
              <div class="opcao-desc">Painel de pedidos e timer</div>
            </div>
          </a>

          <a class="opcao" id="opcao-gestao" href="/gestao.html">
            <div class="opcao-icone gestao">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#2C5F2E"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="20" x2="18" y2="10" />
                <line x1="12" y1="20" x2="12" y2="4" />
                <line x1="6" y1="20" x2="6" y2="14" />
              </svg>
            </div>
            <div>
              <div class="opcao-titulo">Gestão</div>
              <div class="opcao-desc">Relatórios e usuários</div>
            </div>
          </a>

          <button
            class="btn btn-outline btn-full"
            onclick="sair()"
            style="margin-top:8px;"
          >
            Sair
          </button>
        </div>
        <div class="login-rodape">Foto na Cerâmica · Escadaria Selarón</div>
      </div>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
