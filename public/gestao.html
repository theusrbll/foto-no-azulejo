<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foto na Cerâmica — Gestão</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/gestao.css" />
    <script src="/auth.js"></script>
  </head>
  <body>
    <div id="app-gestao">
      <div class="topo">
        <div class="logo-wrap">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
              <rect x="3" y="8" width="22" height="16" rx="3" fill="#1C1C1C" />
              <circle cx="14" cy="16" r="5" fill="#E8C547" />
              <circle cx="14" cy="16" r="3" fill="#1C1C1C" opacity="0.5" />
              <rect x="10" y="5" width="8" height="4" rx="1.5" fill="#1C1C1C" />
            </svg>
          </div>
          <div>
            <div class="logo-nome">Foto na Cerâmica</div>
            <div class="logo-sub">Gestão</div>
          </div>
        </div>
        <div class="topo-direita">
          <span class="topo-info" id="data-hoje"></span>
          <button class="btn-ghost" onclick="voltarMenu()">Menu</button>
          <button class="btn-ghost" onclick="sair()">Sair</button>
        </div>
      </div>

      <div class="conteudo">
        <div class="abas">
          <button
            class="aba ativa"
            id="aba-resumo"
            onclick="mostrarAba('resumo')"
          >
            Resumo
          </button>
          <button
            class="aba inativa"
            id="aba-produtos"
            onclick="mostrarAba('produtos')"
          >
            Produtos
          </button>
          <button
            class="aba inativa"
            id="aba-usuarios"
            onclick="mostrarAba('usuarios')"
          >
            Usuários
          </button>
        </div>

        <!-- RESUMO -->
        <div id="painel-resumo">
          <div class="data-filtro">
            <input type="date" id="filtro-data" />
            <button class="btn btn-primary" onclick="carregarTudo()">
              Filtrar
            </button>
          </div>

          <div id="alerta-atrasados" class="alerta" style="display:none">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <circle cx="12" cy="16" r="0.5" fill="currentColor" />
            </svg>
            <p id="texto-alerta"></p>
          </div>

          <div class="grid-metricas">
            <div class="metrica">
              <div class="metrica-label">Pedidos</div>
              <div class="metrica-valor" id="m-total">—</div>
              <div class="metrica-sub">no dia selecionado</div>
            </div>
            <div class="metrica">
              <div class="metrica-label">Faturamento</div>
              <div class="metrica-valor verde" id="m-faturamento">—</div>
              <div class="metrica-sub">soma dos pedidos</div>
            </div>
            <div class="metrica">
              <div class="metrica-label">Ticket médio</div>
              <div class="metrica-valor" id="m-ticket">—</div>
              <div class="metrica-sub">por pedido</div>
            </div>
            <div class="metrica">
              <div class="metrica-label">Atrasados</div>
              <div class="metrica-valor vermelho" id="m-atrasados">—</div>
              <div class="metrica-sub">acima de 10 min</div>
            </div>
          </div>

          <div class="card">
            <h2>Vendas por ponto</h2>
            <div id="pontos-venda"></div>
          </div>

          <div class="card">
            <h2>Ranking de vendedores</h2>
            <table>
              <thead>
                <tr>
                  <th>Vendedor</th>
                  <th>Pedidos</th>
                  <th>Faturamento</th>
                </tr>
              </thead>
              <tbody id="tabela-vendedores"></tbody>
            </table>
          </div>

          <div class="card">
            <h2>Histórico de pedidos</h2>
            <div id="historico"></div>
          </div>
        </div>

        <!-- PRODUTOS -->
        <div id="painel-produtos" style="display:none"></div>

        <!-- USUÁRIOS -->
        <div id="painel-usuarios" style="display:none"></div>
      </div>
    </div>

    <script src="/js/gestao.js"></script>
  </body>
</html>
