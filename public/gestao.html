<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selarón — Gestão</title>
  <script src="/auth.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f0f0; min-height: 100vh; }

    .topo { background: #1a1a2e; color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
    .topo h1 { font-size: 17px; font-weight: 600; }
    .topo-direita { display: flex; align-items: center; gap: 12px; }
    .topo span { font-size: 13px; opacity: 0.6; }
    .btn-sair { background: none; border: 1.5px solid rgba(255,255,255,0.3); color: white; border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
    .btn-sair:hover { background: rgba(255,255,255,0.1); }

    .conteudo { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

    .abas { display: flex; gap: 8px; margin-bottom: 20px; }
    .aba { border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .aba.ativa { background: #e63946; color: white; border: none; }
    .aba.inativa { background: white; color: #444; border: 1.5px solid #e0e0e0; }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .metrica { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .metrica .label { font-size: 12px; color: #999; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .metrica .valor { font-size: 32px; font-weight: 700; color: #1a1a2e; }
    .metrica .valor.verde { color: #1a8a3c; }
    .metrica .valor.vermelho { color: #e63946; }
    .metrica .sub { font-size: 13px; color: #aaa; margin-top: 4px; }

    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card h2 { font-size: 15px; color: #444; margin-bottom: 16px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 0 10px 0; border-bottom: 1px solid #f0f0f0; }
    td { padding: 12px 0; border-bottom: 1px solid #f8f8f8; font-size: 14px; color: #333; }
    tr:last-child td { border-bottom: none; }
    .td-valor { font-weight: 600; color: #1a8a3c; }

    .badge-ponto { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-ponto.cima { background: #e8f4fd; color: #1a6fa8; }
    .badge-ponto.baixo { background: #fef3e8; color: #c87320; }
    .badge-ponto.outro { background: #f0f0f0; color: #666; }

    .barra-fundo { background: #f0f0f0; border-radius: 4px; height: 8px; margin-top: 6px; }
    .barra-fill { background: #e63946; border-radius: 4px; height: 8px; transition: width 0.6s; }

    .alerta { background: #fff5f5; border: 1px solid #fcc; border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .alerta p { font-size: 14px; color: #c62828; }

    .data-filtro { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .data-filtro input { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; }
    .data-filtro input:focus { border-color: #e63946; }
    .data-filtro button { background: #e63946; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; font-weight: 600; }

    .historico-linha { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .historico-linha:last-child { border-bottom: none; }
    .historico-numero { font-weight: 700; color: #1a1a2e; font-size: 15px; letter-spacing: 1px; }
    .historico-info { font-size: 12px; color: #aaa; margin-top: 2px; }
    .historico-valor { font-weight: 600; color: #1a8a3c; font-size: 14px; }
    .status-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .status-pill.pronto { background: #eafaf0; color: #1a8a3c; }
    .status-pill.aguardando { background: #fff8e6; color: #d4890a; }

    .permissao-check { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    .permissao-check label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #444; cursor: pointer; }

    .vazio-tabela { text-align: center; padding: 30px; color: #ccc; font-size: 14px; }
    input[type="text"], input[type="password"] { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 9px 12px; font-size: 14px; outline: none; }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #e63946; }
  </style>
</head>
<body>

<div id="app-gestao">
  <div class="topo">
    <h1>Painel de gestão</h1>
  <div class="topo-direita">
  <span id="data-hoje"></span>
  <button class="btn-sair" onclick="voltarMenu()">Menu</button>
  <button class="btn-sair" onclick="sair()">Sair</button>
</div>
  </div>

  <div class="conteudo">
    <div class="abas">
      <button class="aba ativa" id="aba-resumo" onclick="mostrarAba('resumo')">Resumo</button>
      <button class="aba inativa" id="aba-usuarios" onclick="mostrarAba('usuarios')">Usuários</button>
    </div>

    <div id="painel-resumo">
      <div class="data-filtro">
        <input type="date" id="filtro-data">
        <button onclick="carregarTudo()">Filtrar</button>
      </div>

      <div id="alerta-atrasados" class="alerta" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c62828" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p id="texto-alerta"></p>
      </div>

      <div class="grid-2">
        <div class="metrica">
          <div class="label">Pedidos hoje</div>
          <div class="valor" id="m-total">—</div>
          <div class="sub">no dia selecionado</div>
        </div>
        <div class="metrica">
          <div class="label">Faturamento</div>
          <div class="valor verde" id="m-faturamento">—</div>
          <div class="sub">soma dos pedidos</div>
        </div>
        <div class="metrica">
          <div class="label">Ticket médio</div>
          <div class="valor" id="m-ticket">—</div>
          <div class="sub">por pedido</div>
        </div>
        <div class="metrica">
          <div class="label">Atrasados agora</div>
          <div class="valor vermelho" id="m-atrasados">—</div>
          <div class="sub">passaram de 10 min</div>
        </div>
      </div>

      <div class="card">
        <h2>Vendas por ponto</h2>
        <div id="pontos-venda"></div>
      </div>

      <div class="card">
        <h2>Ranking de vendedores</h2>
        <table>
          <thead><tr><th>Vendedor</th><th>Pedidos</th><th>Faturamento</th></tr></thead>
          <tbody id="tabela-vendedores"></tbody>
        </table>
      </div>

      <div class="card">
        <h2>Histórico de pedidos</h2>
        <div id="historico"></div>
      </div>
    </div>

    <div id="painel-usuarios" style="display:none"></div>
  </div>
</div>

<script>
  let usuarioLogado = null

  usuarioLogado = getUsuario()
  if (!usuarioLogado || !usuarioLogado.pode_gestao) {
    window.location.href = '/login.html'
  } else {
    const hoje = new Date().toISOString().slice(0, 10)
    document.getElementById('filtro-data').value = hoje
    document.getElementById('data-hoje').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' })
    carregarTudo()
    setInterval(carregarTudo, 30000)
  }

  function mostrarAba(aba) {
    document.getElementById('painel-resumo').style.display = aba === 'resumo' ? 'block' : 'none'
    document.getElementById('painel-usuarios').style.display = aba === 'usuarios' ? 'block' : 'none'
    document.getElementById('aba-resumo').className = aba === 'resumo' ? 'aba ativa' : 'aba inativa'
    document.getElementById('aba-usuarios').className = aba === 'usuarios' ? 'aba ativa' : 'aba inativa'
    if (aba === 'usuarios') carregarUsuarios()
  }

  async function carregarTudo() {
    const data = document.getElementById('filtro-data').value
    await Promise.all([carregarResumo(), carregarHistorico(data)])
  }

  async function carregarResumo() {
    const data = document.getElementById('filtro-data').value
    const res = await fetchAuth('/api/gestao/resumo?data=' + data)
    const d = await res.json()
    const total = d.totalDia.total || 0
    const fat = d.totalDia.faturamento || 0
    const ticket = total > 0 ? fat / total : 0
    document.getElementById('m-total').textContent = total
    document.getElementById('m-faturamento').textContent = 'R$ ' + fat.toFixed(2)
    document.getElementById('m-ticket').textContent = 'R$ ' + ticket.toFixed(2)
    document.getElementById('m-atrasados').textContent = d.atrasados.total
    if (d.atrasados.total > 0) {
      document.getElementById('alerta-atrasados').style.display = 'flex'
      document.getElementById('texto-alerta').textContent = `${d.atrasados.total} pedido(s) passaram de 10 minutos sem ser marcado como pronto!`
    } else {
      document.getElementById('alerta-atrasados').style.display = 'none'
    }
    const maxPonto = Math.max(...d.porPonto.map(p => p.total), 1)
    document.getElementById('pontos-venda').innerHTML = d.porPonto.length === 0
      ? '<div class="vazio-tabela">Nenhum dado</div>'
      : d.porPonto.map(p => `
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px">
              <span class="badge-ponto ${p.ponto_venda === 'cima' ? 'cima' : p.ponto_venda === 'baixo' ? 'baixo' : 'outro'}">${p.ponto_venda}</span>
              <span style="font-weight:600">${p.total} pedido(s)</span>
            </div>
            <div class="barra-fundo"><div class="barra-fill" style="width:${Math.round(p.total / maxPonto * 100)}%"></div></div>
          </div>`).join('')
    document.getElementById('tabela-vendedores').innerHTML = d.porVendedor.length === 0
      ? '<tr><td colspan="3" class="vazio-tabela">Nenhuma venda no período</td></tr>'
      : d.porVendedor.map(v => `
          <tr>
            <td>${v.vendedor}</td>
            <td>${v.total}</td>
            <td class="td-valor">R$ ${(v.faturamento || 0).toFixed(2)}</td>
          </tr>`).join('')
  }

  async function carregarHistorico(data) {
    const res = await fetchAuth('/api/gestao/historico?data=' + data)
    const pedidos = await res.json()
    document.getElementById('historico').innerHTML = pedidos.length === 0
      ? '<div class="vazio-tabela">Nenhum pedido no período</div>'
      : pedidos.map(p => {
          const hora = new Date(p.criado_em + 'Z').toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
          return `
            <div class="historico-linha">
              <div>
                <div class="historico-numero">${p.numero}</div>
                <div class="historico-info">${p.vendedor_nome} · ${p.ponto_venda} · ${p.tamanho} · ${hora}</div>
              </div>
              <div style="text-align:right">
                <div class="historico-valor">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                <span class="status-pill ${p.status}">${p.status === 'pronto' ? 'Pronto' : 'Aguardando'}</span>
              </div>
            </div>`
        }).join('')
  }

  async function carregarUsuarios() {
  const res = await fetchAuth('/api/usuarios')
  const usuarios = await res.json()
  document.getElementById('painel-usuarios').innerHTML = `
    <div class="card">
      <h2>Cadastrar novo usuário</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
        <div>
          <label style="font-size:12px;color:#999;display:block;margin-bottom:4px;">Nome</label>
          <input type="text" id="novo-nome" placeholder="Nome do usuário">
        </div>
        <div>
          <label style="font-size:12px;color:#999;display:block;margin-bottom:4px;">Senha</label>
          <input type="password" id="nova-senha" placeholder="Senha">
        </div>
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:12px;color:#999;display:block;margin-bottom:8px;">Permissões</label>
        <div class="permissao-check">
          <label><input type="checkbox" id="p-vender"> Vendas</label>
          <label><input type="checkbox" id="p-producao"> Produção</label>
          <label><input type="checkbox" id="p-gestao"> Gestão</label>
        </div>
      </div>
      <button onclick="cadastrarUsuario()" style="background:#e63946;color:white;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;">Cadastrar</button>
      <span id="msg-cadastro" style="font-size:13px;margin-left:12px;"></span>
    </div>

    <div class="card">
      <h2>Usuários cadastrados</h2>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Vendas</th>
            <th>Produção</th>
            <th>Gestão</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          ${usuarios.map(u => `
            <tr id="linha-${u.id}">
              <td style="font-weight:500">${u.nome}</td>
              <td>
                <input type="checkbox" ${u.pode_vender ? 'checked' : ''}
                  onchange="alterarPermissao('${u.id}', 'pode_vender', this.checked)"
                  title="Permissão de vendas">
              </td>
              <td>
                <input type="checkbox" ${u.pode_producao ? 'checked' : ''}
                  onchange="alterarPermissao('${u.id}', 'pode_producao', this.checked)"
                  title="Permissão de produção">
              </td>
              <td>
                <input type="checkbox" ${u.pode_gestao ? 'checked' : ''}
                  onchange="alterarPermissao('${u.id}', 'pode_gestao', this.checked)"
                  title="Permissão de gestão">
              </td>
              <td>
                <span class="status-pill ${u.ativo ? 'pronto' : 'aguardando'}">${u.ativo ? 'Ativo' : 'Inativo'}</span>
              </td>
              <td style="display:flex;gap:6px;flex-wrap:wrap;padding:12px 0;">
                <button onclick="toggleAtivo('${u.id}', ${u.ativo})"
                  style="background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;">
                  ${u.ativo ? 'Desativar' : 'Ativar'}
                </button>
                <button onclick="editarSenha('${u.id}')"
                  style="background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;">
                  Senha
                </button>
                <button onclick="excluirUsuario('${u.id}', '${u.nome}')"
                  style="background:none;border:1px solid #fcc;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#c62828;">
                  Excluir
                </button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`
}

  async function cadastrarUsuario() {
    const nome = document.getElementById('novo-nome').value.trim()
    const senha = document.getElementById('nova-senha').value.trim()
    const pode_vender = document.getElementById('p-vender').checked
    const pode_producao = document.getElementById('p-producao').checked
    const pode_gestao = document.getElementById('p-gestao').checked
    const msg = document.getElementById('msg-cadastro')

    if (!nome || !senha) { msg.textContent = 'Preencha nome e senha'; msg.style.color = '#e63946'; return }
    if (!pode_vender && !pode_producao && !pode_gestao) { msg.textContent = 'Selecione ao menos uma permissão'; msg.style.color = '#e63946'; return }

    const res = await fetchAuth('/api/usuarios', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, senha, pode_vender, pode_producao, pode_gestao })
    })
    const data = await res.json()
    if (!res.ok) { msg.textContent = data.erro; msg.style.color = '#e63946'; return }
    msg.textContent = 'Cadastrado com sucesso!'; msg.style.color = '#1a8a3c'
    document.getElementById('novo-nome').value = ''
    document.getElementById('nova-senha').value = ''
    document.getElementById('p-vender').checked = false
    document.getElementById('p-producao').checked = false
    document.getElementById('p-gestao').checked = false
    setTimeout(() => carregarUsuarios(), 800)
  }

  async function toggleAtivo(id, ativoAtual) {
    await fetchAuth(`/api/usuarios/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ativo: !ativoAtual })
    })
    carregarUsuarios()
  }

  async function editarSenha(id) {
    const nova = prompt('Digite a nova senha:')
    if (!nova || !nova.trim()) return
    await fetchAuth(`/api/usuarios/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha: nova.trim() })
    })
    alert('Senha atualizada!')
  }

  async function alterarPermissao(id, permissao, valor) {
  const res = await fetchAuth(`/api/usuarios/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [permissao]: valor })
  })
  if (!res.ok) {
    alert('Erro ao alterar permissão')
    carregarUsuarios()
  }
}

async function excluirUsuario(id, nome) {
  if (!confirm(`Tem certeza que deseja excluir o usuário "${nome}"? Esta ação não pode ser desfeita.`)) return
  const res = await fetchAuth(`/api/usuarios/${id}`, { method: 'DELETE' })
  const data = await res.json()
  if (!res.ok) { alert(data.erro); return }
  carregarUsuarios()
}
</script>
</body>
</html>
