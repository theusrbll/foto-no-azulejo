<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foto na Cerâmica — Meu Pedido</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/rastrear.css" />
  </head>
  <body>
    <!-- LOGO -->
    <div class="rastrear-logo">
      <div class="rastrear-logo-icon">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect x="3" y="8" width="22" height="16" rx="3" fill="#1C1C1C" />
          <circle cx="14" cy="16" r="5" fill="#1C1C1C" opacity="0.5" />
          <circle cx="14" cy="16" r="3" fill="#E8C547" />
          <rect x="10" y="5" width="8" height="4" rx="1.5" fill="#1C1C1C" />
        </svg>
      </div>
      <div>
        <div class="rastrear-logo-nome">Foto na Cerâmica</div>
        <div class="rastrear-logo-sub">Escadaria Selarón</div>
      </div>
    </div>

    <!-- SELETOR DE IDIOMA -->
    <div class="lang-row">
      <button class="lang-btn ativo" data-lang="pt" onclick="mudarIdioma('pt')">
        PT
      </button>
      <button class="lang-btn" data-lang="en" onclick="mudarIdioma('en')">
        EN
      </button>
      <button class="lang-btn" data-lang="es" onclick="mudarIdioma('es')">
        ES
      </button>
    </div>

    <!-- CARD PRINCIPAL -->
    <div class="rastrear-card">
      <div id="conteudo">
        <div class="inicio-wrap">
          <div class="inicio-titulo" id="inicio-titulo">
            Acompanhe seu pedido
          </div>
          <p class="inicio-msg" id="inicio-msg">
            Digite o código que está no seu comprovante
          </p>
        </div>
        <hr style="border:none;border-top:1px solid var(--borda);margin:0" />
      </div>

      <div class="busca-wrap">
        <span class="busca-label" id="busca-label">Código do pedido</span>
        <div class="busca-row">
          <input
            type="text"
            class="busca-input"
            id="busca-input"
            placeholder="ABC123"
            maxlength="6"
          />
          <button class="busca-btn" id="busca-btn" onclick="buscar()">
            Buscar
          </button>
        </div>
      </div>
    </div>

    <script src="/js/rastrear.js"></script>
  </body>
</html>
